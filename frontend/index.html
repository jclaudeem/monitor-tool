<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Tool — Dashboard</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1><i class="fa-solid fa-chart-network" style="margin-right:8px;color:#2980b9"></i>Monitor Tool</h1>
    <span>Network &amp; Server Monitor</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a href="index.html" class="nav-link active">
      <i class="fa-solid fa-gauge"></i> Dashboard
    </a>
    <a href="clients.html" class="nav-link">
      <i class="fa-solid fa-building"></i> Clients
    </a>
    <a href="devices.html" class="nav-link">
      <i class="fa-solid fa-server"></i> Devices
    </a>
    <a href="agents.html" class="nav-link">
      <i class="fa-solid fa-satellite-dish"></i> Agents
    </a>
  </nav>
</aside>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <h2>Dashboard</h2>
    <div class="topbar-right">
      <span class="topbar-meta" id="last-updated">Loading…</span>
      <button class="btn btn-ghost" onclick="loadDashboard()">
        <i class="fa-solid fa-arrows-rotate"></i> Refresh
      </button>
    </div>
  </header>

  <!-- Client tabs -->
  <div class="client-tabs" id="client-tabs"></div>

  <!-- DEV: remove when upgrading to SQL Basic tier -->
  <div class="dev-banner">
    <span style="display:flex;align-items:center;gap:8px">
      <i class="fa-solid fa-database" style="color:#2980b9"></i>
      <strong>Database:</strong>
      <span id="db-status-badge" class="db-badge loading">…</span>
    </span>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn btn-sm" id="btn-db-pause" onclick="dbAction('pause')">
        <i class="fa-solid fa-pause"></i> Pause
      </button>
      <button class="btn btn-sm btn-success" id="btn-db-resume" onclick="dbAction('resume')">
        <i class="fa-solid fa-play"></i> Resume
      </button>
      <button class="btn btn-ghost btn-sm" onclick="refreshDbStatus()" title="Refresh status">
        <i class="fa-solid fa-arrows-rotate"></i>
      </button>
    </div>
  </div>

  <div class="content">
    <!-- Summary cards -->
    <div class="summary-grid">
      <div class="summary-card total">
        <div class="summary-icon"><i class="fa-solid fa-server"></i></div>
        <div class="summary-info">
          <label>Total Devices</label>
          <div class="count" id="count-total">—</div>
        </div>
      </div>
      <div class="summary-card up">
        <div class="summary-icon"><i class="fa-solid fa-circle-check"></i></div>
        <div class="summary-info">
          <label>Online</label>
          <div class="count" id="count-up">—</div>
        </div>
      </div>
      <div class="summary-card down">
        <div class="summary-icon"><i class="fa-solid fa-circle-xmark"></i></div>
        <div class="summary-info">
          <label>Offline</label>
          <div class="count" id="count-down">—</div>
        </div>
      </div>
      <div class="summary-card unknown">
        <div class="summary-icon"><i class="fa-solid fa-circle-question"></i></div>
        <div class="summary-info">
          <label>Unknown</label>
          <div class="count" id="count-unknown">—</div>
        </div>
      </div>
    </div>

    <!-- Device status table -->
    <div class="section-card" style="margin-bottom:20px">
      <div class="section-header">
        <h3><i class="fa-solid fa-list-check" style="margin-right:8px;color:#2980b9"></i>Device Status</h3>
        <span class="topbar-meta" id="device-count"></span>
      </div>
      <div id="table-wrap">
        <div class="empty-state"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Agents summary -->
    <div class="section-card">
      <div class="section-header">
        <h3><i class="fa-solid fa-satellite-dish" style="margin-right:8px;color:#2980b9"></i>Agents</h3>
        <a href="agents.html" class="btn btn-ghost btn-sm">Manage →</a>
      </div>
      <div id="agents-wrap">
        <div class="empty-state" style="padding:30px"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<style>
  .client-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 0;
  }
  .client-tab {
    padding: 7px 16px;
    border-radius: 6px 6px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: -2px;
    transition: background .15s, color .15s;
  }
  .client-tab:hover { background: var(--hover-bg); color: var(--text-primary); }
  .client-tab.active {
    background: var(--card-bg);
    color: var(--primary);
    border-color: var(--border);
    border-bottom-color: var(--card-bg);
    font-weight: 600;
  }
  .dev-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(243,156,18,0.08);
    border: 1px solid rgba(243,156,18,0.3);
    border-radius: 8px;
    padding: 10px 16px;
    margin: 0 0 16px 0;
    font-size: 14px;
  }
  .db-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .db-badge.loading    { background: rgba(150,150,150,.15); color: var(--text-secondary); }
  .db-badge.online     { background: rgba(0,184,148,.15);   color: #00b894; }
  .db-badge.paused     { background: rgba(214,48,49,.12);   color: var(--down); }
  .db-badge.pausing    { background: rgba(214,48,49,.08);   color: var(--down); }
  .db-badge.resuming   { background: rgba(41,128,185,.12);  color: #2980b9; }
  .db-badge.error      { background: rgba(214,48,49,.12);   color: var(--down); }
  .db-badge.sleeping   { background: rgba(214,48,49,.12);   color: var(--down); }
  .btn-success { background: rgba(0,184,148,.15); color: #00b894; border: 1px solid rgba(0,184,148,.3); }
  .btn-success:hover { background: rgba(0,184,148,.25); }
</style>
<script src="assets/app.js"></script>
<script>
  let activeClientId = null;
  let allClients = [];

  function agentStatusClass(lastSeen) {
    if (!lastSeen) return 'never';
    const diffMin = (Date.now() - new Date(lastSeen + (lastSeen.endsWith('Z') ? '' : 'Z'))) / 60000;
    if (diffMin < 2)  return 'online';
    if (diffMin < 10) return 'delayed';
    return 'offline';
  }

  async function initTabs() {
    try {
      allClients = await api.get('/api/clients');
    } catch {
      allClients = [];
    }
    // Check URL param for initial tab
    const urlClient = parseInt(new URLSearchParams(location.search).get('clientId') || '0') || null;
    activeClientId = urlClient;
    renderTabs();
  }

  function renderTabs() {
    const bar = document.getElementById('client-tabs');
    const allTab = `<button class="client-tab${activeClientId === null ? ' active' : ''}" onclick="selectTab(null)">
      <i class="fa-solid fa-layer-group" style="margin-right:5px"></i>All Clients
    </button>`;
    const clientTabs = allClients.map(c =>
      `<button class="client-tab${activeClientId === c.id ? ' active' : ''}" onclick="selectTab(${c.id})">
        ${escHtml(c.name)}
      </button>`
    ).join('');
    bar.innerHTML = allTab + clientTabs;
  }

  function selectTab(clientId) {
    activeClientId = clientId;
    renderTabs();
    loadDashboard();
    // Update URL without reload
    const url = new URL(location.href);
    if (clientId) url.searchParams.set('clientId', clientId);
    else url.searchParams.delete('clientId');
    history.replaceState(null, '', url);
  }

  async function loadDashboard() {
    try {
      const qs = activeClientId ? `?clientId=${activeClientId}` : '';
      const [summary, devices, agents] = await Promise.all([
        api.get('/api/status/summary' + qs),
        api.get('/api/devices' + qs),
        api.get('/api/agents'),
      ]);
      renderSummary(summary);
      renderDeviceTable(devices);
      renderAgents(agents);
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (err) {
      document.getElementById('last-updated').textContent = 'Database waking up — retrying in 30s…';
      console.error(err);
    }
  }

  function renderSummary(s) {
    document.getElementById('count-total').textContent   = s.total;
    document.getElementById('count-up').textContent      = s.up;
    document.getElementById('count-down').textContent    = s.down;
    document.getElementById('count-unknown').textContent = s.unknown;
  }

  function renderDeviceTable(devices) {
    const wrap = document.getElementById('table-wrap');
    document.getElementById('device-count').textContent =
      `${devices.length} device${devices.length !== 1 ? 's' : ''}`;

    if (devices.length === 0) {
      wrap.innerHTML = `<div class="empty-state">
        <i class="fa-solid fa-server"></i>
        <p>No devices configured. <a href="devices.html">Add your first device →</a></p>
      </div>`;
      return;
    }

    const order = { down: 0, unknown: 1, up: 2 };
    devices.sort((a, b) => {
      const as = a.last_status || 'unknown';
      const bs = b.last_status || 'unknown';
      return (order[as] ?? 1) - (order[bs] ?? 1);
    });

    const rows = devices.map(d => {
      const status = d.last_status || 'unknown';
      const agentCell = d.agent_name
        ? `<span class="type-badge"><i class="fa-solid fa-satellite-dish"></i> ${escHtml(d.agent_name)}</span>`
        : `<span style="color:var(--text-secondary);font-size:12px">Direct</span>`;
      return `<tr>
        <td>
          <div class="status-cell">
            <span class="status-dot ${status}"></span>
            ${statusBadgeHtml(status)}
          </div>
        </td>
        <td><strong>${escHtml(d.name)}</strong></td>
        <td><code style="font-size:13px">${escHtml(d.ip_address)}</code></td>
        <td><span class="type-badge"><i class="${deviceTypeIcon(d.type)}"></i> ${escHtml(d.type)}</span></td>
        <td>${escHtml(d.location || '—')}</td>
        <td>${agentCell}</td>
        <td>${formatResponseTime(d.last_response_time)}</td>
        <td style="color:var(--text-secondary);font-size:13px">${timeAgo(d.last_polled_at)}</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<table class="data-table">
      <thead>
        <tr>
          <th>Status</th>
          <th>Name</th>
          <th>IP Address</th>
          <th>Type</th>
          <th>Location</th>
          <th>Monitored By</th>
          <th>Response</th>
          <th>Last Checked</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function renderAgents(agents) {
    const wrap = document.getElementById('agents-wrap');
    if (agents.length === 0) {
      wrap.innerHTML = `<div class="empty-state" style="padding:30px">
        <i class="fa-solid fa-satellite-dish"></i>
        <p>No agents registered. <a href="agents.html">Set up an agent →</a></p>
      </div>`;
      return;
    }

    const rows = agents.map(a => {
      const sc = agentStatusClass(a.last_seen);
      const dotColor = { online:'var(--up)', delayed:'#f39c12', offline:'var(--down)', never:'var(--unknown)' }[sc];
      const label    = { online:'Online', delayed:'Delayed', offline:'Offline', never:'Never connected' }[sc];
      return `<tr>
        <td>
          <span style="width:10px;height:10px;border-radius:50%;background:${dotColor};display:inline-block;margin-right:6px;vertical-align:middle"></span>
          <strong>${escHtml(a.name)}</strong>
        </td>
        <td style="color:var(--text-secondary)">${escHtml(a.location || '—')}</td>
        <td><span class="status-badge ${sc === 'online' ? 'up' : 'down'}"
                  style="${sc === 'delayed' ? 'background:rgba(243,156,18,0.12);color:#b7770d' : ''}">${label}</span></td>
        <td style="color:var(--text-secondary);font-size:13px">${timeAgo(a.last_seen)}</td>
        <td><span class="type-badge"><i class="fa-solid fa-server"></i> ${a.device_count} device${a.device_count !== 1 ? 's' : ''}</span></td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<table class="data-table">
      <thead>
        <tr><th>Agent</th><th>Location</th><th>Status</th><th>Last Seen</th><th>Devices</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── DB pause/resume controls (DEV only) ─────────────────────────────────
  let dashboardTimer = null;

  function startDashboardPolling() {
    if (dashboardTimer) clearInterval(dashboardTimer);
    dashboardTimer = setInterval(loadDashboard, 30000);
  }

  function stopDashboardPolling() {
    if (dashboardTimer) { clearInterval(dashboardTimer); dashboardTimer = null; }
  }

  let _dbPaused = false;

  function setDbBadge(text, cls) {
    const badge = document.getElementById('db-status-badge');
    badge.textContent = text;
    badge.className = 'db-badge ' + cls;
  }

  async function refreshDbStatus() {
    if (_dbPaused) { setDbBadge('Sleeping', 'paused'); return; }
    try {
      const data = await api.get('/api/dbstatus');
      const s = (data.status || 'Unknown').toLowerCase();
      setDbBadge(data.status, s === 'online' ? 'online' : s.startsWith('paus') ? 'paused' : s.startsWith('resum') ? 'resuming' : 'loading');
    } catch {
      setDbBadge('Unknown', 'loading');
    }
  }

  async function dbAction(action) {
    const pauseBtn  = document.getElementById('btn-db-pause');
    const resumeBtn = document.getElementById('btn-db-resume');
    pauseBtn.disabled = resumeBtn.disabled = true;
    setDbBadge(action === 'pause' ? 'Pausing…' : 'Waking up…', action === 'pause' ? 'pausing' : 'resuming');
    try {
      await api.post('/api/db' + action, {});
      _dbPaused = (action === 'pause');
      if (_dbPaused) {
        stopDashboardPolling();
        setDbBadge('Sleeping', 'paused');
      } else {
        setDbBadge('Waking up…', 'resuming');
        startDashboardPolling();
        setTimeout(loadDashboard, 5000);   // give DB ~40s to resume; first load may fail
        setTimeout(refreshDbStatus, 10000);
      }
    } catch (err) {
      setDbBadge('Error', 'error');
    } finally {
      pauseBtn.disabled = resumeBtn.disabled = false;
    }
  }

  refreshDbStatus();
  setInterval(refreshDbStatus, 30000);
  // ────────────────────────────────────────────────────────────────────────

  initTabs().then(() => loadDashboard());
  startDashboardPolling();
</script>
</body>
</html>
