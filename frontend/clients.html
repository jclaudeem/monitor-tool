<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Tool — Clients</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .client-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
    .client-card {
      background:var(--card-bg);
      border:1px solid var(--border);
      border-radius:10px;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .client-card-header { display:flex; justify-content:space-between; align-items:flex-start; }
    .client-name { font-size:16px; font-weight:700; color:var(--text-primary); }
    .client-meta { font-size:13px; color:var(--text-secondary); display:flex; flex-direction:column; gap:4px; }
    .client-meta i { width:14px; text-align:center; margin-right:5px; color:var(--primary); }
    .client-stats { display:flex; gap:12px; margin-top:4px; }
    .client-stat { display:flex; align-items:center; gap:5px; font-size:13px; }
    .client-actions { display:flex; gap:6px; }
    .no-clients { text-align:center; padding:60px 20px; color:var(--text-secondary); }
    .no-clients i { font-size:48px; margin-bottom:16px; display:block; opacity:.3; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div style="background:#fff;border-radius:8px;padding:10px 14px;text-align:center">
      <img src="images/irondome-logo.png" alt="IronDome Secured Systems" style="width:120px;height:auto;display:block;margin:0 auto">
    </div>
    <span style="display:block;text-align:center;margin-top:8px">Network &amp; Server Monitor</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a href="index.html" class="nav-link">
      <i class="fa-solid fa-gauge"></i> Dashboard
    </a>
    <a href="clients.html" class="nav-link active">
      <i class="fa-solid fa-building"></i> Clients
    </a>
    <a href="devices.html" class="nav-link">
      <i class="fa-solid fa-server"></i> Devices
    </a>
    <a href="agents.html" class="nav-link">
      <i class="fa-solid fa-satellite-dish"></i> Agents
    </a>
    <div class="nav-label" style="margin-top:8px">Account</div>
    <a href="settings.html" class="nav-link">
      <i class="fa-solid fa-gear"></i> Settings
    </a>
  </nav>
</aside>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h2>Clients</h2>
      <span class="topbar-meta" id="client-count" style="font-size:12px;opacity:.7"></span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" data-admin-only onclick="openAddDialog()">
        <i class="fa-solid fa-plus"></i> New Client
      </button>
      <div class="user-menu" id="user-menu">
        <button class="user-avatar" onclick="toggleUserMenu(event)">
          <span id="user-initial">?</span>
        </button>
        <div class="user-dropdown" id="user-dropdown">
          <div class="user-dropdown-header">
            <div class="user-dropdown-name" id="user-dropdown-name">—</div>
            <span class="role-badge" id="user-dropdown-role">—</span>
          </div>
          <div class="user-dropdown-divider"></div>
          <a href="settings.html" class="user-dropdown-item">
            <i class="fa-solid fa-gear"></i> Settings
          </a>
          <div class="user-dropdown-divider"></div>
          <button class="user-dropdown-item danger" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Log Out
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="content">
    <div id="clients-wrap">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Add / Edit Dialog -->
<dialog id="client-dialog">
  <div class="dialog-header">
    <h3 id="dialog-title">New Client</h3>
    <button class="btn-icon" onclick="closeDialog()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <form id="client-form" onsubmit="submitClient(event)">
    <div class="dialog-body">
      <div class="form-group">
        <label for="f-name">Company Name <span style="color:var(--down)">*</span></label>
        <input type="text" id="f-name" placeholder="e.g. Acme Corporation" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="f-contact">Contact Name</label>
          <input type="text" id="f-contact" placeholder="e.g. Jane Smith">
        </div>
        <div class="form-group">
          <label for="f-phone">Phone</label>
          <input type="text" id="f-phone" placeholder="e.g. (305) 555-0100">
        </div>
      </div>
      <div class="form-group">
        <label for="f-email">Contact Email</label>
        <input type="email" id="f-email" placeholder="e.g. jane@acme.com">
      </div>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-ghost" onclick="closeDialog()">Cancel</button>
      <button type="submit" class="btn btn-primary" id="submit-btn">
        <i class="fa-solid fa-check"></i> Save Client
      </button>
    </div>
  </form>
</dialog>

<!-- Delete Confirm -->
<dialog id="confirm-dialog">
  <div class="dialog-header">
    <h3>Delete Client</h3>
    <button class="btn-icon" onclick="document.getElementById('confirm-dialog').close()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <div class="dialog-body">
    <p>Delete client <strong id="confirm-name"></strong>?</p>
    <p style="margin-top:8px;color:var(--text-secondary);font-size:13px">
      Agents assigned to this client will be unassigned but not deleted.
    </p>
  </div>
  <div class="dialog-footer">
    <button class="btn btn-ghost" onclick="document.getElementById('confirm-dialog').close()">Cancel</button>
    <button class="btn btn-danger" id="confirm-delete-btn">
      <i class="fa-solid fa-trash"></i> Delete
    </button>
  </div>
</dialog>

<script src="assets/app.js"></script>
<script>
  if (!requireAuth()) throw new Error('not authed');
  const isAdmin = getAuthUser()?.role === 'admin';
  let clients = [];
  let editingId = null;

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function loadClients() {
    try {
      clients = await api.get('/api/clients');
      renderClients();
    } catch {
      showToast('Failed to load clients', 'error');
    }
  }

  function renderClients() {
    const wrap = document.getElementById('clients-wrap');
    document.getElementById('client-count').textContent =
      `${clients.length} client${clients.length !== 1 ? 's' : ''}`;

    if (clients.length === 0) {
      wrap.innerHTML = `<div class="no-clients">
        <i class="fa-solid fa-building"></i>
        <p>No clients yet. Click <strong>New Client</strong> to add your first one.</p>
      </div>`;
      return;
    }

    const cards = clients.map(c => `
      <div class="client-card">
        <div class="client-card-header">
          <span class="client-name">${escHtml(c.name)}</span>
          <div class="client-actions">
            <a href="index.html?clientId=${c.id}" class="btn btn-ghost btn-sm" title="View dashboard">
              <i class="fa-solid fa-gauge"></i>
            </a>
            ${isAdmin ? `<button class="btn-icon" title="Edit" onclick="openEditDialog(${c.id})">
              <i class="fa-solid fa-pen"></i>
            </button>
            <button class="btn-icon danger" title="Delete" onclick="openDeleteConfirm(${c.id})">
              <i class="fa-solid fa-trash"></i>
            </button>` : ''}
          </div>
        </div>
        <div class="client-meta">
          ${c.contact_name  ? `<span><i class="fa-solid fa-user"></i>${escHtml(c.contact_name)}</span>` : ''}
          ${c.contact_email ? `<span><i class="fa-solid fa-envelope"></i>${escHtml(c.contact_email)}</span>` : ''}
          ${c.contact_phone ? `<span><i class="fa-solid fa-phone"></i>${escHtml(c.contact_phone)}</span>` : ''}
          ${!c.contact_name && !c.contact_email && !c.contact_phone
            ? `<span style="opacity:.5">No contact info</span>` : ''}
        </div>
        <div class="client-stats">
          <span class="client-stat type-badge">
            <i class="fa-solid fa-satellite-dish"></i> ${c.agent_count} agent${c.agent_count !== 1 ? 's' : ''}
          </span>
          <span class="client-stat type-badge">
            <i class="fa-solid fa-server"></i> ${c.device_count} device${c.device_count !== 1 ? 's' : ''}
          </span>
        </div>
      </div>
    `).join('');

    wrap.innerHTML = `<div class="client-cards">${cards}</div>`;
  }

  function openAddDialog() {
    editingId = null;
    document.getElementById('dialog-title').textContent = 'New Client';
    document.getElementById('client-form').reset();
    document.getElementById('client-dialog').showModal();
  }

  function openEditDialog(id) {
    const c = clients.find(x => x.id === id);
    if (!c) return;
    editingId = id;
    document.getElementById('dialog-title').textContent = 'Edit Client';
    document.getElementById('f-name').value    = c.name          || '';
    document.getElementById('f-contact').value = c.contact_name  || '';
    document.getElementById('f-email').value   = c.contact_email || '';
    document.getElementById('f-phone').value   = c.contact_phone || '';
    document.getElementById('client-dialog').showModal();
  }

  function closeDialog() {
    document.getElementById('client-dialog').close();
  }

  async function submitClient(e) {
    e.preventDefault();
    const payload = {
      name:          document.getElementById('f-name').value.trim(),
      contact_name:  document.getElementById('f-contact').value.trim() || null,
      contact_email: document.getElementById('f-email').value.trim() || null,
      contact_phone: document.getElementById('f-phone').value.trim() || null,
    };
    try {
      if (editingId) {
        await api.put(`/api/clients/${editingId}`, payload);
        showToast('Client updated');
      } else {
        await api.post('/api/clients', payload);
        showToast('Client created');
      }
      closeDialog();
      await loadClients();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  function openDeleteConfirm(id) {
    const c = clients.find(x => x.id === id);
    if (!c) return;
    document.getElementById('confirm-name').textContent = c.name;
    document.getElementById('confirm-delete-btn').onclick = async () => {
      try {
        await api.del(`/api/clients/${id}`);
        document.getElementById('confirm-dialog').close();
        showToast('Client deleted');
        await loadClients();
      } catch (err) {
        showToast(err.message, 'error');
      }
    };
    document.getElementById('confirm-dialog').showModal();
  }

  loadClients();
</script>
</body>
</html>
