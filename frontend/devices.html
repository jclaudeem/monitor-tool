<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Tool — Devices</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1><i class="fa-solid fa-chart-network" style="margin-right:8px;color:#2980b9"></i>Monitor Tool</h1>
    <span>Network &amp; Server Monitor</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a href="index.html" class="nav-link">
      <i class="fa-solid fa-gauge"></i> Dashboard
    </a>
    <a href="devices.html" class="nav-link active">
      <i class="fa-solid fa-server"></i> Devices
    </a>
    <a href="agents.html" class="nav-link">
      <i class="fa-solid fa-satellite-dish"></i> Agents
    </a>
  </nav>
</aside>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <h2>Devices</h2>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openAddDialog()">
        <i class="fa-solid fa-plus"></i> Add Device
      </button>
    </div>
  </header>

  <div class="content">
    <div class="section-card">
      <div class="section-header">
        <h3><i class="fa-solid fa-server" style="margin-right:8px;color:#2980b9"></i>Managed Devices</h3>
        <span class="topbar-meta" id="device-count"></span>
      </div>
      <div id="table-wrap">
        <div class="empty-state"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Add / Edit Dialog -->
<dialog id="device-dialog">
  <div class="dialog-header">
    <h3 id="dialog-title">Add Device</h3>
    <button class="btn-icon" onclick="closeDialog()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <form id="device-form" onsubmit="submitDevice(event)">
    <div class="dialog-body">
      <input type="hidden" id="edit-id">
      <div class="form-row">
        <div class="form-group">
          <label for="f-name">Device Name <span style="color:var(--down)">*</span></label>
          <input type="text" id="f-name" placeholder="e.g. Core Router" required>
        </div>
        <div class="form-group">
          <label for="f-ip">IP Address <span style="color:var(--down)">*</span></label>
          <input type="text" id="f-ip" placeholder="e.g. 192.168.1.1" required
                 pattern="^(\d{1,3}\.){3}\d{1,3}$" title="Enter a valid IPv4 address">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="f-type">Type</label>
          <select id="f-type">
            <option value="router">Router</option>
            <option value="switch">Switch</option>
            <option value="firewall">Firewall</option>
            <option value="server">Server</option>
            <option value="device">Device</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-location">Location</label>
          <input type="text" id="f-location" placeholder="e.g. Main Office, Rack A">
        </div>
      </div>
      <div class="form-group">
        <label for="f-agent">Monitored By</label>
        <select id="f-agent">
          <option value="">Server — Direct polling</option>
        </select>
        <p style="font-size:12px;color:var(--text-secondary);margin-top:4px">
          Choose an agent if this device is on a private network not reachable from the server.
          <a href="agents.html" target="_blank">Manage agents →</a>
        </p>
      </div>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-ghost" onclick="closeDialog()">Cancel</button>
      <button type="submit" class="btn btn-primary" id="submit-btn">
        <i class="fa-solid fa-floppy-disk"></i> Save Device
      </button>
    </div>
  </form>
</dialog>

<!-- Confirm Delete Dialog -->
<dialog id="confirm-dialog">
  <div class="dialog-header">
    <h3>Delete Device</h3>
    <button class="btn-icon" onclick="document.getElementById('confirm-dialog').close()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <div class="dialog-body">
    <p>Delete <strong id="confirm-name"></strong>?</p>
    <p style="margin-top:8px;color:var(--text-secondary);font-size:13px">
      All poll history for this device will also be deleted.
    </p>
  </div>
  <div class="dialog-footer">
    <button class="btn btn-ghost" onclick="document.getElementById('confirm-dialog').close()">Cancel</button>
    <button class="btn btn-danger" id="confirm-delete-btn">
      <i class="fa-solid fa-trash"></i> Delete
    </button>
  </div>
</dialog>

<script src="assets/app.js"></script>
<script>
  let devices = [];
  let agents  = [];

  async function loadAll() {
    [devices, agents] = await Promise.all([
      api.get('/api/devices'),
      api.get('/api/agents'),
    ]);
    renderTable();
  }

  function renderTable() {
    const wrap = document.getElementById('table-wrap');
    document.getElementById('device-count').textContent =
      `${devices.length} device${devices.length !== 1 ? 's' : ''}`;

    if (devices.length === 0) {
      wrap.innerHTML = `<div class="empty-state">
        <i class="fa-solid fa-server"></i>
        <p>No devices yet. Click <strong>Add Device</strong> to get started.</p>
      </div>`;
      return;
    }

    const rows = devices.map(d => {
      const monitoredBy = d.agent_name
        ? `<span class="type-badge"><i class="fa-solid fa-satellite-dish"></i> ${escHtml(d.agent_name)}</span>`
        : `<span style="color:var(--text-secondary);font-size:12px">Direct</span>`;
      return `<tr>
        <td><strong>${escHtml(d.name)}</strong></td>
        <td><code style="font-size:13px">${escHtml(d.ip_address)}</code></td>
        <td><span class="type-badge"><i class="${deviceTypeIcon(d.type)}"></i> ${escHtml(d.type)}</span></td>
        <td style="color:var(--text-secondary)">${escHtml(d.location || '—')}</td>
        <td>${monitoredBy}</td>
        <td style="color:var(--text-secondary);font-size:13px">${new Date(d.created_at).toLocaleDateString()}</td>
        <td>
          <button class="btn-icon" title="Edit" onclick="openEditDialog(${d.id})">
            <i class="fa-solid fa-pen"></i>
          </button>
          <button class="btn-icon danger" title="Delete" onclick="openDeleteConfirm(${d.id})">
            <i class="fa-solid fa-trash"></i>
          </button>
        </td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>IP Address</th>
          <th>Type</th>
          <th>Location</th>
          <th>Monitored By</th>
          <th>Added</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function populateAgentSelect(selectedId) {
    const sel = document.getElementById('f-agent');
    sel.innerHTML = '<option value="">Server — Direct polling</option>';
    for (const a of agents) {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = `${a.name}${a.location ? ' (' + a.location + ')' : ''}`;
      if (a.id === selectedId) opt.selected = true;
      sel.appendChild(opt);
    }
  }

  function openAddDialog() {
    document.getElementById('dialog-title').textContent = 'Add Device';
    document.getElementById('submit-btn').innerHTML = '<i class="fa-solid fa-plus"></i> Add Device';
    document.getElementById('edit-id').value = '';
    document.getElementById('device-form').reset();
    populateAgentSelect(null);
    document.getElementById('device-dialog').showModal();
  }

  function openEditDialog(id) {
    const d = devices.find(x => x.id === id);
    if (!d) return;
    document.getElementById('dialog-title').textContent = 'Edit Device';
    document.getElementById('submit-btn').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
    document.getElementById('edit-id').value   = id;
    document.getElementById('f-name').value    = d.name;
    document.getElementById('f-ip').value      = d.ip_address;
    document.getElementById('f-type').value    = d.type;
    document.getElementById('f-location').value = d.location || '';
    populateAgentSelect(d.agent_id);
    document.getElementById('device-dialog').showModal();
  }

  function closeDialog() {
    document.getElementById('device-dialog').close();
  }

  async function submitDevice(e) {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const agentVal = document.getElementById('f-agent').value;
    const payload = {
      name:       document.getElementById('f-name').value.trim(),
      ip_address: document.getElementById('f-ip').value.trim(),
      type:       document.getElementById('f-type').value,
      location:   document.getElementById('f-location').value.trim() || null,
      agent_id:   agentVal ? parseInt(agentVal) : null,
    };
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    try {
      if (id) {
        await api.put(`/api/devices/${id}`, payload);
        showToast('Device updated');
      } else {
        await api.post('/api/devices', payload);
        showToast('Device added — first poll in progress');
      }
      closeDialog();
      await loadAll();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function openDeleteConfirm(id) {
    const d = devices.find(x => x.id === id);
    if (!d) return;
    document.getElementById('confirm-name').textContent = d.name;
    document.getElementById('confirm-delete-btn').onclick = async () => {
      try {
        await api.del(`/api/devices/${id}`);
        document.getElementById('confirm-dialog').close();
        showToast('Device deleted');
        await loadAll();
      } catch (err) {
        showToast(err.message, 'error');
      }
    };
    document.getElementById('confirm-dialog').showModal();
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadAll();
</script>
</body>
</html>
